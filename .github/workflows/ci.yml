name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and test
        run: ./mvnw verify

      - name: Analyse with SonarCloud
        if: github.ref == 'refs/heads/main'
        run: ./mvnw sonar:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Java Test Results
          path: "target/surefire-reports/*.xml,target/failsafe-reports/*.xml"
          reporter: java-junit

      - name: Upload application JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/movie-catalog-api-*.jar
          retention-days: 1

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  api-tests:
    name: API Tests (TypeScript)
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout movie-catalog-api
        uses: actions/checkout@v7

      - name: Start movie-catalog-api
        uses: ./.github/actions/start-api

      - name: Checkout api-testing-ts
        uses: actions/checkout@v7
        with:
          repository: EnesAkyel/api-testing-ts
          path: api-testing-ts

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: api-testing-ts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: api-testing-ts

      - name: Smoke tests
        run: npm run test:smoke
        working-directory: api-testing-ts

      - name: Contract tests
        run: npm run test:contract
        working-directory: api-testing-ts

      - name: Integration tests
        run: npm run test:integration
        working-directory: api-testing-ts

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-reports
          path: api-testing-ts/reports/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: API Test Results
          path: api-testing-ts/reports/*-junit.xml
          reporter: jest-junit

  gatling:
    name: Gatling Simulations
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start movie-catalog-api
        uses: ./.github/actions/start-api

      - name: Run Gatling simulation
        run: ./mvnw gatling:test -Dgatling.simulationClass=simulations.BasicSimulation

      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gatling-report
          path: target/gatling/
          retention-days: 30
