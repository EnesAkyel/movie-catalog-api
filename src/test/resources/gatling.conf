gatling {
  core {
    encoding = "utf-8"
    elFileBodiesCache = true
    rawFileBodiesCache = true
  }
  http {
    fetchedCssCacheMaxCapacity = 200
    fetchedHtmlCacheMaxCapacity = 200
    perUserCacheMaxCapacity = 200
    warmUpUrl = "https://gatling.io"
    enableGA = false
  }
  data {
    writers = [console, file]
    console {
      light = false
      writePeriod = 5
    }
    file {
      bufferSize = 8192
    }
  }
}
